<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Vibrant Indigo to Pink Gradient -->
    <linearGradient id="grad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle with soft gradient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#grad)" opacity="0.12" filter="url(#glow)" />
  <!-- Glowing Thunder Strike (Lightning Bolt) -->
  <path d="M296 32L128 272h120l-56 208L384 240H264l56-208z" fill="url(#grad)" filter="url(#glow)" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" />
</svg>